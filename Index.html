<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADVERSE | AuraFabric Ledger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: white; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(40px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .seasonal-glow { position: fixed; top: -10%; right: -10%; width: 50vw; height: 50vw; border-radius: 50%; filter: blur(120px); opacity: 0.15; z-index: -1; transition: all 2s ease; }
    </style>
</head>
<body>
    <div id="glow" class="seasonal-glow bg-purple-500"></div>

    <header class="flex justify-between items-center p-8 max-w-7xl mx-auto">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-gradient-to-tr from-purple-600 to-orange-400 rounded-xl rotate-12 shadow-lg shadow-purple-500/20"></div>
            <span class="text-2xl font-black tracking-tighter uppercase">Adverse</span>
        </div>
        <div class="hidden md:flex gap-8 text-xs font-bold tracking-widest opacity-40 uppercase">
            <a href="#" class="hover:opacity-100 transition">Vault</a>
            <a href="#" class="hover:opacity-100 transition">Tactical</a>
            <a href="#" class="hover:opacity-100 transition">Ledger</a>
        </div>
        <div class="w-10 h-10 rounded-full border border-white/10 glass flex items-center justify-center overflow-hidden">
            <div class="w-6 h-6 bg-white/20 rounded-full"></div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-8 py-12">
        <div class="mb-16">
            <h1 id="weather-text" class="text-5xl md:text-8xl font-black tracking-tighter uppercase leading-none mb-4">Winds of<br><span class="text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-orange-300">Destiny</span></h1>
            <p class="text-white/40 max-w-md text-sm font-medium">Curating the world's finest materials. Synced with global weather patterns and blockchain-verified scarcity.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="group relative aspect-[4/5] rounded-[45px] overflow-hidden border border-white/5 glass">
                <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1528459801416-a9e53bbf4e17?q=80&w=1000')] bg-cover grayscale group-hover:grayscale-0 transition-all duration-700"></div>
                <div class="absolute inset-0 bg-gradient-to-t from-black via-black/20 to-transparent"></div>
                <div class="absolute bottom-8 left-8 right-8">
                    <div class="flex items-center gap-2 mb-3">
                        <span class="bg-orange-600 text-[9px] font-bold px-2 py-0.5 rounded">Live Supply</span>
                        <div class="w-1.5 h-1.5 bg-orange-500 rounded-full animate-pulse"></div>
                    </div>
                    <h2 class="text-3xl font-black uppercase tracking-tighter">Liquid Silk</h2>
                    <p class="text-white/40 text-xs mt-1">Blockchain Hash: 0x82...f92</p>
                    <div class="mt-4 h-1 w-full bg-white/10 rounded-full overflow-hidden">
                        <div class="h-full bg-purple-500 w-[78%]"></div>
                    </div>
                </div>
            </div>

            <div class="group relative aspect-[4/5] rounded-[45px] overflow-hidden border border-white/5 glass">
                <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1618220179428-22790b461013?q=80&w=1000')] bg-cover grayscale group-hover:grayscale-0 transition-all duration-700"></div>
                <div class="absolute inset-0 bg-gradient-to-t from-black via-black/20 to-transparent"></div>
                <div class="absolute bottom-8 left-8 right-8">
                    <div class="flex items-center gap-2 mb-3 text-white/40 text-[9px] font-bold tracking-widest uppercase">
                        <span>Thermal Grade 9</span>
                    </div>
                    <h2 class="text-3xl font-black uppercase tracking-tighter">Arctic Wool</h2>
                    <div class="mt-6 flex justify-between items-end">
                        <div class="text-2xl font-bold">$120<span class="text-xs opacity-40">/m</span></div>
                        <button class="bg-white text-black px-6 py-3 rounded-full text-xs font-black uppercase hover:bg-orange-400 transition">Tactical Report</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-10 left-1/2 -translate-x-1/2 w-[90%] max-w-lg h-20 glass rounded-[40px] flex items-center px-8 gap-6 shadow-2xl">
        <div class="flex-1 opacity-40 text-xs font-bold tracking-widest uppercase">Ask AI about durability...</div>
        <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-purple-500 to-orange-400 p-[1px]">
            <div class="w-full h-full bg-black rounded-full flex items-center justify-center">
                <div class="w-2 h-2 bg-white rounded-full"></div>
            </div>
        </div>
    </nav>

    <script>
        // Seasonal Logic
        const temp = 18; // Manual test temp, in real app this fetches from OpenWeather
        const glow = document.getElementById('glow');
        const text = document.getElementById('weather-text');

        if (temp > 25) {
            glow.className = "seasonal-glow bg-orange-500";
            text.innerHTML = "Summer<br><span class='text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-yellow-300'>Essentials</span>";
        } else if (temp < 15) {
            glow.className = "seasonal-glow bg-blue-500";
            text.innerHTML = "Winter<br><span class='text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-300'>Thermal</span>";
        }
    </script>
</body>
</html>
